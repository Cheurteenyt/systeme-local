name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.29"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-bootstrap.txt

      - name: Install pinned dependency manager
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Sync frozen environment
        run: uv sync --frozen --extra dev --python python

      - name: Check lock
        run: uv lock --check

      - name: Lint
        run: uv run --frozen --extra dev ruff check .

      - name: Check formatting ratchet
        env:
          SLG_FORMAT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          SLG_FORMAT_HEAD: ${{ github.sha }}
        run: >-
          uv run --frozen --extra dev
          python scripts/check_python_format.py
          --base "$SLG_FORMAT_BASE"
          --head "$SLG_FORMAT_HEAD"

      - name: Check typing ratchet
        env:
          SLG_TYPING_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          SLG_TYPING_HEAD: ${{ github.sha }}
        run: >-
          uv run --frozen --extra dev
          python scripts/check_python_typing.py
          --base "$SLG_TYPING_BASE"
          --head "$SLG_TYPING_HEAD"

      - name: Check Markdown links
        run: uv run --frozen --extra dev python scripts/check_markdown_links.py

      - name: Check deterministic evidence governance
        run: >-
          uv run --frozen --extra dev
          python scripts/check_evidence_governance.py
          --as-of 2026-07-18T20:00:00Z
          --fail-within-days 0

      - name: Check documentation contracts
        run: uv run --frozen --extra dev pytest -q tests/test_documentation_governance.py

      - name: Audit frozen Python dependencies
        run: >-
          uv run --frozen --extra dev
          python scripts/audit_python_dependencies.py

      - name: Test with coverage
        run: >-
          uv run --frozen --extra dev
          python -m pytest
          --cov=systeme_local_gateway
          --cov-report=term-missing
          --cov-fail-under=60

  compatibility:
    name: compatibility (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tools/requirements-bootstrap.txt

      - name: Install pinned dependency manager
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Sync frozen environment
        run: uv sync --frozen --extra dev --python python

      - name: Run tests
        run: uv run --frozen --extra dev python -m pytest -q

  rust-quality:
    name: rust quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >-
          cargo clippy
          --workspace
          --all-targets
          --all-features
          --locked
          --
          -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked --no-fail-fast

      - name: Check doctests
        run: cargo test --doc --workspace --all-features --locked

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: >-
          cargo doc
          --workspace
          --all-features
          --no-deps
          --document-private-items
          --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dependencies
        run: cargo audit

  rust-windows:
    name: rust tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check bundled PowerShell collector syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "crates/audit-watchdog/src/windows_snapshot.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if (@($errors).Count -ne 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Exercise operator-evidence custodian protocol
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $requestPath = (
              Resolve-Path `
                  "tests/fixtures/operator_evidence_custodian/valid_request.ndjson"
          ).Path
          $responsePath = (
              Resolve-Path `
                  "tests/fixtures/operator_evidence_custodian/valid_response.ndjson"
          ).Path

          $strictUtf8 = [System.Text.UTF8Encoding]::new($false, $true)
          $requestBytes = [System.IO.File]::ReadAllBytes($requestPath)

          if (
              $requestBytes.Length -ge 3 -and
              $requestBytes[0] -eq 0xEF -and
              $requestBytes[1] -eq 0xBB -and
              $requestBytes[2] -eq 0xBF
          ) {
              throw "Custodian request fixture must not contain a UTF-8 BOM"
          }

          $requestText = $strictUtf8.GetString($requestBytes).Replace("`r`n", "`n")
          $requestWithoutTerminator = $requestText.TrimEnd([char[]]"`n")

          if (
              -not $requestText.EndsWith("`n", [StringComparison]::Ordinal) -or
              $requestWithoutTerminator.Contains("`n") -or
              $requestWithoutTerminator.Contains("`r") -or
              [string]::IsNullOrWhiteSpace($requestWithoutTerminator)
          ) {
              throw "Custodian request fixture must contain exactly one terminated message"
          }

          $expected = (
              [System.IO.File]::ReadAllText(
                  $responsePath,
                  $strictUtf8
              )
          ).Replace("`r`n", "`n")

          & cargo build `
              --quiet `
              --locked `
              --package systeme-local-operator-evidence-custodian

          if ($LASTEXITCODE -ne 0) {
              throw "Custodian protocol build failed"
          }

          $binary = (
              Resolve-Path `
                  "target/debug/systeme-local-operator-evidence-custodian.exe"
          ).Path

          $tempRoot = if (
              -not [string]::IsNullOrWhiteSpace($env:RUNNER_TEMP)
          ) {
              $env:RUNNER_TEMP
          }
          else {
              [System.IO.Path]::GetTempPath()
          }

          $nonce = [guid]::NewGuid().ToString("N")
          $stdoutPath = Join-Path $tempRoot "custodian-$nonce.stdout"
          $stderrPath = Join-Path $tempRoot "custodian-$nonce.stderr"

          try {
              $process = Start-Process `
                  -FilePath $binary `
                  -WorkingDirectory (Get-Location).Path `
                  -NoNewWindow `
                  -Wait `
                  -PassThru `
                  -RedirectStandardInput $requestPath `
                  -RedirectStandardOutput $stdoutPath `
                  -RedirectStandardError $stderrPath

              $actualBytes = [System.IO.File]::ReadAllBytes($stdoutPath)
              $stderrBytes = [System.IO.File]::ReadAllBytes($stderrPath)
              $actual = $strictUtf8.GetString($actualBytes).Replace("`r`n", "`n")
              $stderr = $strictUtf8.GetString($stderrBytes)

              if ($process.ExitCode -ne 0) {
                  throw (
                      "Custodian protocol command failed: exit=" +
                      "$($process.ExitCode); stdout_base64=" +
                      [Convert]::ToBase64String($actualBytes) +
                      "; stderr_base64=" +
                      [Convert]::ToBase64String($stderrBytes)
                  )
              }

              if ($stderrBytes.Length -ne 0) {
                  throw (
                      "Custodian protocol emitted unexpected stderr_base64=" +
                      [Convert]::ToBase64String($stderrBytes)
                  )
              }

              if ($actual -cne $expected) {
                  throw (
                      "Custodian protocol response mismatch: actual_base64=" +
                      [Convert]::ToBase64String($actualBytes)
                  )
              }
          }
          finally {
              Remove-Item `
                  -LiteralPath $stdoutPath `
                  -Force `
                  -ErrorAction SilentlyContinue
              Remove-Item `
                  -LiteralPath $stderrPath `
                  -Force `
                  -ErrorAction SilentlyContinue
          }

      - name: Test
        run: cargo test --workspace --all-features --locked --no-fail-fast
