name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test with coverage
        run: >-
          python -m pytest
          --cov=systeme_local_gateway
          --cov-report=term-missing
          --cov-fail-under=60

  compatibility:
    name: compatibility (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  rust-quality:
    name: rust quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >-
          cargo clippy
          --workspace
          --all-targets
          --all-features
          --locked
          --
          -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: >-
          cargo doc
          --workspace
          --no-deps
          --document-private-items
          --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dependencies
        run: cargo audit

  rust-windows:
    name: rust tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check bundled PowerShell collector syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "crates/audit-watchdog/src/windows_snapshot.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if (@($errors).Count -ne 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Test
        run: cargo test --workspace --all-features --locked
