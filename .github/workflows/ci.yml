name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.29"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/requirements-bootstrap.txt

      - name: Install pinned dependency manager
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Sync frozen environment
        run: uv sync --frozen --extra dev --python python

      - name: Check lock
        run: uv lock --check

      - name: Lint
        run: uv run --frozen --extra dev ruff check .

      - name: Check formatting ratchet
        env:
          SLG_FORMAT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          SLG_FORMAT_HEAD: ${{ github.sha }}
        run: >-
          uv run --frozen --extra dev
          python scripts/check_python_format.py
          --base "$SLG_FORMAT_BASE"
          --head "$SLG_FORMAT_HEAD"

      - name: Check typing ratchet
        env:
          SLG_TYPING_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          SLG_TYPING_HEAD: ${{ github.sha }}
        run: >-
          uv run --frozen --extra dev
          python scripts/check_python_typing.py
          --base "$SLG_TYPING_BASE"
          --head "$SLG_TYPING_HEAD"

      - name: Check Markdown links
        run: uv run --frozen --extra dev python scripts/check_markdown_links.py

      - name: Check deterministic evidence governance
        run: >-
          uv run --frozen --extra dev
          python scripts/check_evidence_governance.py
          --as-of 2026-07-18T20:00:00Z
          --fail-within-days 0

      - name: Check documentation contracts
        run: uv run --frozen --extra dev pytest -q tests/test_documentation_governance.py

      - name: Audit frozen Python dependencies
        run: >-
          uv run --frozen --extra dev
          python scripts/audit_python_dependencies.py

      - name: Test with coverage
        run: >-
          uv run --frozen --extra dev
          python -m pytest
          --cov=systeme_local_gateway
          --cov-report=term-missing
          --cov-fail-under=60

  compatibility:
    name: compatibility (Python 3.14)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tools/requirements-bootstrap.txt

      - name: Install pinned dependency manager
        run: python -m pip install --disable-pip-version-check "uv==${UV_VERSION}"

      - name: Sync frozen environment
        run: uv sync --frozen --extra dev --python python

      - name: Run tests
        run: uv run --frozen --extra dev python -m pytest -q

  rust-quality:
    name: rust quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check
        run: cargo check --workspace --all-targets --all-features --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >-
          cargo clippy
          --workspace
          --all-targets
          --all-features
          --locked
          --
          -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked --no-fail-fast

      - name: Check doctests
        run: cargo test --doc --workspace --all-features --locked

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: >-
          cargo doc
          --workspace
          --all-features
          --no-deps
          --document-private-items
          --locked

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dependencies
        run: cargo audit

  rust-windows:
    name: rust tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Rust 1.97.1
        run: >-
          rustup toolchain install 1.97.1
          --profile minimal
          --component rustfmt,clippy

      - name: Select Rust toolchain
        run: rustup override set 1.97.1

      - name: Check bundled PowerShell collector syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "crates/audit-watchdog/src/windows_snapshot.ps1"),
            [ref]$tokens,
            [ref]$errors
          )
          if (@($errors).Count -ne 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Exercise operator-evidence custodian protocol
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $requestPath = (
              Resolve-Path `
                  "tests/fixtures/operator_evidence_custodian/valid_request.ndjson"
          ).Path
          $responsePath = (
              Resolve-Path `
                  "tests/fixtures/operator_evidence_custodian/valid_response.ndjson"
          ).Path

          $request = [System.IO.File]::ReadAllText(
              $requestPath,
              [System.Text.Encoding]::UTF8
          )
          $expected = (
              [System.IO.File]::ReadAllText(
                  $responsePath,
                  [System.Text.Encoding]::UTF8
              )
          ).Replace("`r`n", "`n")

          & cargo build `
              --quiet `
              --locked `
              --package systeme-local-operator-evidence-custodian

          if ($LASTEXITCODE -ne 0) {
              throw "Custodian protocol build failed"
          }

          $binary = (
              Resolve-Path `
                  "target/debug/systeme-local-operator-evidence-custodian.exe"
          ).Path

          $startInfo = New-Object System.Diagnostics.ProcessStartInfo
          $startInfo.FileName = $binary
          $startInfo.WorkingDirectory = (Get-Location).Path
          $startInfo.UseShellExecute = $false
          $startInfo.CreateNoWindow = $true
          $startInfo.RedirectStandardInput = $true
          $startInfo.RedirectStandardOutput = $true
          $startInfo.RedirectStandardError = $true

          if (
              $startInfo.PSObject.Properties.Name -contains
              "StandardOutputEncoding"
          ) {
              $startInfo.StandardOutputEncoding = [System.Text.Encoding]::UTF8
              $startInfo.StandardErrorEncoding = [System.Text.Encoding]::UTF8
          }

          $process = New-Object System.Diagnostics.Process
          $process.StartInfo = $startInfo

          try {
              if (-not $process.Start()) {
                  throw "Custodian protocol process did not start"
              }

              $process.StandardInput.Write($request)
              $process.StandardInput.Close()

              $actual = (
                  $process.StandardOutput.ReadToEnd()
              ).Replace("`r`n", "`n")
              $stderr = $process.StandardError.ReadToEnd()

              $process.WaitForExit()

              if ($process.ExitCode -ne 0) {
                  throw (
                      "Custodian protocol command failed with exit " +
                      "$($process.ExitCode): $stderr"
                  )
              }

              if ($stderr.Length -ne 0) {
                  throw "Custodian protocol emitted unexpected stderr"
              }

              if ($actual -cne $expected) {
                  throw "Custodian protocol response mismatch"
              }
          }
          finally {
              $process.Dispose()
          }

      - name: Test
        run: cargo test --workspace --all-features --locked --no-fail-fast
