name: ci
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest --cov=systeme_local_gateway --cov-report=term-missing
